<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="popup">
  <header>
    <h1>NYT Recipe Clipper</h1>
    <a id="open-options" href="#" class="settings-link" title="Settings">⚙</a>
  </header>

  <div id="status" class="muted">Reading page…</div>

  <div id="preview" hidden>
    <div id="recipe-name" class="recipe-name"></div>
    <div id="recipe-meta" class="recipe-meta muted"></div>
    <button id="import-btn" class="primary">Clip recipe</button>
  </div>

  <div id="success" hidden class="success">
    <div id="success-msg"></div>
    <a id="open-recipe" href="#" target="_blank">Open in Meal Planner →</a>
  </div>

  <div id="error" hidden class="error"></div>

  <script src="popup.js"></script>
</body>
</html>
