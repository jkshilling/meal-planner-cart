<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Recipe Clipper — Settings</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="options">
  <h1>Recipe Clipper — Settings</h1>
  <p>
    This extension clips recipes from NYT Cooking (and any site publishing
    schema.org Recipe data) into your Meal Planner app.
    Paste your bearer token below — find it on the
    <a id="settings-link" href="https://meals.alaskatargeting.com/settings#grocery-extension" target="_blank">Meal Planner Settings page</a>
    under "Grocery extension API token".
  </p>

  <label for="token">API token</label>
  <input id="token" type="text" placeholder="fbe_…" autocomplete="off" />

  <label for="apiBase">Meal Planner URL</label>
  <input id="apiBase" type="text" placeholder="https://meals.alaskatargeting.com" autocomplete="off" />

  <button id="save">Save</button>
  <div id="msg"></div>

  <script src="options.js"></script>
</body>
</html>
