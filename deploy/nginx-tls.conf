# Nginx site for meal-planner-cart — TLS-enabled version.
#
# Used by deploy/deploy.sh once Let's Encrypt has issued a cert at
# /etc/letsencrypt/live/meals.alaskatargeting.com/fullchain.pem.
# Before the cert exists, deploy.sh installs deploy/nginx.conf (HTTP-only)
# instead, so nginx -t doesn't fail on a missing cert file.
#
# This file mirrors what `certbot --nginx -d meals.alaskatargeting.com`
# would write in place. Keeping it in-repo means subsequent deploys don't
# clobber the 443 server block.

# Redirect all plain HTTP to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name meals.alaskatargeting.com;

    # Let certbot renewals keep working via the HTTP-01 challenge path.
    location /.well-known/acme-challenge/ { allow all; try_files $uri =404; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name meals.alaskatargeting.com;

    ssl_certificate     /etc/letsencrypt/live/meals.alaskatargeting.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meals.alaskatargeting.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 2m;

    access_log /var/log/nginx/meal-planner-cart.access.log;
    error_log  /var/log/nginx/meal-planner-cart.error.log;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_redirect off;
    }
}
