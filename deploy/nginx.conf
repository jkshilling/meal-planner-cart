# Nginx site for meal-planner-cart on the shared grabbag droplet.
# - Specific server_name only — NEVER `_` or `default_server`.
# - Installed at /etc/nginx/sites-available/meal-planner-cart.conf
#   and symlinked into /etc/nginx/sites-enabled/ by deploy/deploy.sh.
# - HTTPS added later by `certbot --nginx -d meals.alaskatargeting.com`,
#   which rewrites this file in place with the 443 block + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name meals.alaskatargeting.com;

    # Cap upload size — the app only accepts small form posts.
    client_max_body_size 2m;

    # Basic access/error logs, per-app so they don't mix with other apps.
    access_log /var/log/nginx/meal-planner-cart.access.log;
    error_log  /var/log/nginx/meal-planner-cart.error.log;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_redirect off;
    }
}
